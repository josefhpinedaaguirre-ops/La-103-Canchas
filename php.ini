; ============================================================
; php.ini — Canchas La 103
; Configuración PHP para Vercel (entorno serverless)
; ============================================================

; Sesiones: usa /tmp que es el único directorio escribible en serverless
session.save_path = "/tmp"
session.gc_maxlifetime = 3600
session.cookie_lifetime = 0
session.use_strict_mode = 1

; Seguridad: ocultar errores en producción
display_errors = Off
display_startup_errors = Off
log_errors = On

; Charset
default_charset = "UTF-8"
mbstring.internal_encoding = UTF-8

; Zona horaria (ajusta según tu región)
date.timezone = "America/Bogota"

; Límites
max_execution_time = 30
memory_limit = 128M
post_max_size = 8M
upload_max_filesize = 2M
